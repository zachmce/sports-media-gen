# Source: D-01 through D-12 from 06-CONTEXT.md; SHAs verified via gh api (06-RESEARCH.md)
name: Publish

# Default to no permissions; grant per-job minimum
permissions: {}

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

jobs:
  # scan-secret and scan-deps now live in ci.yml (shared with the pull_request
  # path, no duplication). This caller must grant security-events: write so
  # those called jobs can still upload SARIF on the push/tag path — a called
  # workflow's job permissions are capped by the caller's grant.
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      security-events: write

  # Trivy stays release-only, not on the PR path: it requires a full amd64
  # image build per run, and its vuln-type: os,library + ignore-unfixed
  # coverage is time-dependent (new CVEs land daily) — a green Trivy at PR
  # time doesn't imply green at release time, so a PR-time run buys little
  # for its build cost. gitleaks + pip-audit are cheap and moved to ci.yml;
  # this asymmetry is intentional, not an oversight.
  build-scan-push:
    runs-on: ubuntu-latest
    needs: [ci]
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      # arm64 emulation via QEMU binfmt_misc (CI-02)
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      # Authenticate to GHCR with built-in GITHUB_TOKEN — no PAT (D-10)
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive OCI tags + labels from git ref (D-09)
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=edge,branch=main
            type=sha,prefix=sha-,format=short,branch=main
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
          labels: |
            org.opencontainers.image.title=matchup-thumbs
            org.opencontainers.image.description=Sports matchup image generator
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      # Pass 1: build amd64 only, load locally for scanning (D-06, Pitfall 2)
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: ghcr.io/${{ github.repository }}:scan-gate
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trivy scan against locally-loaded amd64 image (D-05, Pitfall 5)
      # .trivyignore at repo root is automatically read by trivy-action
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:scan-gate
          format: sarif
          output: trivy-results.sarif
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      # Pass 2: multi-arch push with SBOM + provenance attestations (CI-02, CI-03, D-07)
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        id: build-push
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      # Upload Trivy SARIF to Security tab (if: always() so it uploads even on scan failure)
      - uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81  # v4.37.3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      # Install legacy cosign (v2) for GHCR/Kyverno .sig-tag compatibility
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2
        with:
          cosign-release: 'v2.6.1'

      # Sign published image by digest with keyless OIDC (Pitfall 3: --yes required in CI)
      - name: Sign image by digest
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
          IMAGE: ghcr.io/${{ github.repository }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
