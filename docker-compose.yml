services:
  postgres:
    image: postgres:17.10
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-matchup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-matchup}
      POSTGRES_DB: ${POSTGRES_DB:-matchup}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-matchup}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4.9-bookworm
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment:
      DB_USER: ${POSTGRES_USER:-matchup}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-matchup}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-matchup}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seed:
    build: .
    command: ["python", "-m", "matchup_thumbs.seed"]
    environment:
      POSTGRES_DSN: "postgresql+psycopg://${POSTGRES_USER:-matchup}:${POSTGRES_PASSWORD:-matchup}@postgres:5432/${POSTGRES_DB:-matchup}"
      REDIS_URL: "redis://redis:6379/0"
      SEED_LEAGUES: "${SEED_LEAGUES:-nba,nfl,mlb,nhl,ncaaf,ncaab,milb,milb-aaa,milb-aa,milb-high-a,milb-a,milb-rookie,milb-winter,milb-independent}"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: "no"
    profiles: ["seed"]

  api:
    build: .
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    environment:
      POSTGRES_DSN: "postgresql+psycopg://${POSTGRES_USER:-matchup}:${POSTGRES_PASSWORD:-matchup}@postgres:5432/${POSTGRES_DB:-matchup}"
      REDIS_URL: "redis://redis:6379/0"
      # Global render-cache kill-switch (CACHE-09/CACHE-10). Passthrough from the
      # host/.env so operators can toggle it without a rebuild; default true keeps
      # caching on (no behavior change when unset).
      RENDER_CACHE_ENABLED: "${RENDER_CACHE_ENABLED:-true}"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3)\""
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:stable-alpine3.23
    ports:
      - "${NGINX_HOST_PORT:-8080}:80"
    environment:
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
      # Restrict envsubst to ONLY this var so nginx runtime variables ($host,
      # $remote_addr, …) and any future container env can never be substituted.
      NGINX_ENVSUBST_FILTER: NGINX_TRUSTED_PROXY_CIDR
      NGINX_TRUSTED_PROXY_CIDR: ${NGINX_TRUSTED_PROXY_CIDR:-172.16.0.0/12}
    volumes:
      - ./nginx:/etc/nginx/templates:ro
      - nginxcache:/var/cache/nginx/matchup
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  redisdata:
  nginxcache:
