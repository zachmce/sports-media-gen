services:
  postgres:
    image: postgres:17.10
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-matchup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-matchup}
      POSTGRES_DB: ${POSTGRES_DB:-matchup}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-matchup}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4.9-bookworm
    volumes:
      - redisdata:/data

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment:
      DB_USER: ${POSTGRES_USER:-matchup}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-matchup}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-matchup}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DSN: "postgresql+psycopg://${POSTGRES_USER:-matchup}:${POSTGRES_PASSWORD:-matchup}@postgres:5432/${POSTGRES_DB:-matchup}"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started

volumes:
  pgdata:
  redisdata:
