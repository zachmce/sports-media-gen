services:
  postgres:
    image: postgres:17.10
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-matchup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-matchup}
      POSTGRES_DB: ${POSTGRES_DB:-matchup}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-matchup}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4.9-bookworm
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment:
      DB_USER: ${POSTGRES_USER:-matchup}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-matchup}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-matchup}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seed:
    build: .
    command: ["python", "-m", "matchup_thumbs.seed"]
    environment:
      POSTGRES_DSN: "postgresql+psycopg://${POSTGRES_USER:-matchup}:${POSTGRES_PASSWORD:-matchup}@postgres:5432/${POSTGRES_DB:-matchup}"
      REDIS_URL: "redis://redis:6379/0"
      SEED_LEAGUES: "${SEED_LEAGUES:-nba,nfl,mlb,nhl,ncaaf,ncaab}"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: "no"
    profiles: ["seed"]

  api:
    build: .
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    environment:
      POSTGRES_DSN: "postgresql+psycopg://${POSTGRES_USER:-matchup}:${POSTGRES_PASSWORD:-matchup}@postgres:5432/${POSTGRES_DB:-matchup}"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3)\""
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
  redisdata:
