title = "matchup-thumbs gitleaks config"

[extend]
# Use upstream default rules
useDefault = true

[[allowlists]]
description = "allow .env.example placeholder values"
paths = ['''\.env\.example$''']

[[allowlists]]
description = "allow test fixture placeholder credentials (conftest and fixtures dir only)"
paths = [
    '''tests/conftest\.py$''',
    '''tests/fixtures/.*''',
]
